name: Go

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1'
        id: go

      - name: Vet
        run: make vet

      - name: Test
        run: make test
